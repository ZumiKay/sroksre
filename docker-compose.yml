services:
  postgres:
    image: postgres:18-alpine
    container_name: sroksre_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sroksre_admin
      POSTGRES_PASSWORD: Kkzumi@sroksre001
      POSTGRES_DB: sroksre_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sroksre_admin -d sroksre_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
